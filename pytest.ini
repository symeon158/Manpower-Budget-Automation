"""Tests for the projection/budget formulas using known employee fixtures."""
from __future__ import annotations

import pandas as pd
import pytest

from mb.calc.budget import (compute_annual_gross_salary_budget,
                             compute_fy_months_budget)
from mb.calc.projections import (compute_fy_gross_salary_projection,
                                  compute_months_projection)
from tests.fixtures import (DEFAULT_BUDGET_BASE, DEFAULT_BUDGET_YEAR,
                             DEFAULT_PROJECTION_DATE, build_sample_df)


class TestMonthsProjection:
    def test_writes_expected_column(self):
        df = build_sample_df()
        out = compute_months_projection(df, DEFAULT_PROJECTION_DATE, 2025)
        assert "Months Projection 25" in out.columns

    def test_long_tenure_employee_gets_full_remainder(self):
        """An employee hired in 2010 with no retire date should have ~3 months + bonus."""
        df = build_sample_df()
        out = compute_months_projection(df, DEFAULT_PROJECTION_DATE, 2025)
        e1 = out[out["Hrms Id"] == "E001"].iloc[0]
        # From Oct 1 to Dec 31 = 3 months + Christmas bonus, so >= 3
        assert e1["Months Projection 25"] >= 3.0

    def test_already_retired_gets_zero(self):
        df = pd.DataFrame([{
            "Hrms Id": "R1", "Surname": "X", "Name": "Y",
            "Hiring Date": pd.Timestamp(2010, 1, 1),
            "Retire Date": pd.Timestamp(2024, 6, 30),
            "Monthly Gross Salary (Current)": 1000.0,
        }])
        out = compute_months_projection(df, DEFAULT_PROJECTION_DATE, 2025)
        assert out["Months Projection 25"].iloc[0] == 0.0


class TestFyMonthsBudget:
    def test_full_year_employee_gets_full_periods(self):
        df = build_sample_df()
        out = compute_fy_months_budget(df, DEFAULT_BUDGET_BASE, 14, DEFAULT_BUDGET_YEAR)
        col = "FY Months Budget 26"
        assert col in out.columns
        # E001 is hired 2010, no retirement → full year
        e1 = out[out["Hrms Id"] == "E001"].iloc[0]
        assert e1[col] == pytest.approx(14.0, abs=0.2)

    def test_mid_year_retiree_gets_less(self):
        df = build_sample_df()
        out = compute_fy_months_budget(df, DEFAULT_BUDGET_BASE, 14, DEFAULT_BUDGET_YEAR)
        col = "FY Months Budget 26"
        e3 = out[out["Hrms Id"] == "E003"].iloc[0]   # retires 2026-08-31
        # Should be strictly less than 14
        assert 0 < e3[col] < 14


class TestFyGrossSalaryProjection:
    def test_writes_column(self):
        df = build_sample_df()
        out = compute_fy_gross_salary_projection(df, DEFAULT_PROJECTION_DATE, 2025)
        assert "FY Gross Salary Projection For 25" in out.columns

    def test_positive_for_active_employees(self):
        df = build_sample_df()
        out = compute_fy_gross_salary_projection(df, DEFAULT_PROJECTION_DATE, 2025)
        col = "FY Gross Salary Projection For 25"
        # At least the long-tenure employees should have positive projections
        active = out[out["Hrms Id"].isin(["E001", "E005"])]
        assert (active[col] > 0).all()


class TestChristmasGiftCap:
    """Christmas gift period (DP) must never exceed 1.0."""

    def test_fy_months_budget_dp_capped(self):
        """An employee active all year should get DP=1.0, never more."""
        df = pd.DataFrame([{
            "Hrms Id": "T1",
            "Hiring Date": pd.Timestamp(2010, 1, 1),
            "Retire Date": pd.NaT,
            "Monthly Gross Salary (Current)": 1500.0,
        }])
        out = compute_fy_months_budget(df, DEFAULT_BUDGET_BASE, 14,
                                         DEFAULT_BUDGET_YEAR)
        # If DP exceeded 1, BonM would exceed (0.5 + 0.5 + 1) = 2.0,
        # and "FY Months Budget 26" would exceed 14.0
        col = "FY Months Budget 26"
        assert out[col].iloc[0] <= 14.0, (
            f"FY Months Budget should not exceed payroll periods (14), "
            f"got {out[col].iloc[0]} — Christmas period likely exceeds 1.0")

    def test_annual_gross_does_not_explode(self):
        df = pd.DataFrame([{
            "Hrms Id": "T1",
            "Hiring Date": pd.Timestamp(2010, 1, 1),
            "Retire Date": pd.NaT,
            "Monthly Gross Salary (Current)": 2000.0,
            "Grade": 10,
        }])
        df = compute_fy_months_budget(df, DEFAULT_BUDGET_BASE, 14,
                                       DEFAULT_BUDGET_YEAR)
        out = compute_annual_gross_salary_budget(
            df,
            effective_increase_date=pd.Timestamp(2026, 5, 1),
            no_increase_cutoff=pd.Timestamp(2025, 8, 1),
            inc_pct=0.03, inc_pct2=0.05, budget_year=2026)
        # Sanity: a €2000 employee should have annual budget <~ €40k
        assert out["Annual Gross Salary FY Budget 2026"].iloc[0] < 40000


class TestCostGatingByActiveMonths:
    """Cost columns should be zero when active months are zero."""

    def test_zero_projection_months_zeros_proj_costs(self):
        # Mock an employee retiring before the projection date (so Months Projection = 0)
        from datetime import date
        from mb.scenarios import Scenario, run_scenario
        df = pd.DataFrame([{
            "Hrms Id": "RET",
            "Surname": "X", "Name": "Y",
            "Division": "Admin", "Department": "HR",
            "Job Title": "X", "Job Property": "ADMIN",
            "Grade": 10,
            "Date of Birth": pd.Timestamp(1960, 1, 1),
            "Hiring Date": pd.Timestamp(1995, 1, 1),
            # Retires BEFORE projection date — Months Projection should be 0
            "Retire Date": pd.Timestamp(2025, 2, 15),
            "Monthly Gross Salary (Current)": 2000.0,
            "Κωδικός Κράτησης": "40050",
        }])
        s = Scenario(name="T", projection_date=pd.Timestamp(2025, 10, 1),
                      no_increase_cutoff=date(2025, 8, 1),
                      effective_increase_date=date(2026, 5, 1))
        out, cols = run_scenario(df, s)
        # When months projection is 0, the projection cost columns should be 0
        proj_months = float(out[cols.months_col].iloc[0] or 0)
        if proj_months <= 0:
            assert float(out[cols.fy_emp_cont_col].iloc[0]) == 0.0
            assert float(out[cols.total_cost_py].iloc[0])  == 0.0
    def test_writes_column(self):
        df = build_sample_df()
        df = compute_fy_months_budget(df, DEFAULT_BUDGET_BASE, 14, DEFAULT_BUDGET_YEAR)
        out = compute_annual_gross_salary_budget(
            df,
            effective_increase_date = pd.Timestamp(2026, 5, 1),
            no_increase_cutoff      = pd.Timestamp(2025, 8, 1),
            inc_pct                 = 0.03,
            inc_pct2                = 0.05,
            budget_year             = 2026)
        assert "Annual Gross Salary FY Budget 2026" in out.columns

    def test_higher_increase_yields_higher_budget(self):
        df = build_sample_df()
        df = compute_fy_months_budget(df, DEFAULT_BUDGET_BASE, 14, DEFAULT_BUDGET_YEAR)

        common = dict(
            effective_increase_date=pd.Timestamp(2026, 5, 1),
            no_increase_cutoff     =pd.Timestamp(2025, 8, 1),
            inc_pct2               =0.05,
            budget_year            =2026)

        low  = compute_annual_gross_salary_budget(df.copy(), inc_pct=0.03, **common)
        high = compute_annual_gross_salary_budget(df.copy(), inc_pct=0.10, **common)

        col = "Annual Gross Salary FY Budget 2026"
        assert high[col].sum() > low[col].sum()
